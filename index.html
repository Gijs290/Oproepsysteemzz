<!DOCTYPE html>
<html>
<head>
    <title>Zorg Registratie Systeem</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        input, select, button { margin: 5px; padding: 5px; }
        .patient { border: 1px solid gray; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>

<h1>🩺 Patiënt Registratie</h1>

<h3>Zoek patiënt</h3>
<input type="text" id="zoek" placeholder="Zoek op naam of ID">
<button onclick="zoekPatient()">Zoek</button>

<hr>

<h3>Nieuwe patiënt registreren</h3>
<input type="text" id="token" placeholder="Token">
<input type="text" id="naam" placeholder="Naam">
<input type="text" id="id" placeholder="ID">
<select id="geslacht">
    <option>Man</option>
    <option>Vrouw</option>
</select>
<input type="text" id="reden" placeholder="Reden afspraak">
<select id="rapport">
    <option>Eerste keer</option>
    <option>Al vaker geweest</option>
</select>

<button onclick="voegToe()">Toevoegen</button>

<hr>

<h3>Wachtrij</h3>
<button onclick="volgende()">Volgende patiënt</button>

<div id="lijst"></div>

<script>
let patiënten = [];

function voegToe() {
    let patiënt = {
        token: document.getElementById("token").value,
        naam: document.getElementById("naam").value,
        id: document.getElementById("id").value,
        geslacht: document.getElementById("geslacht").value,
        reden: document.getElementById("reden").value,
        rapport: document.getElementById("rapport").value
    };

    patiënten.push(patiënt);
    toonLijst();
}

function toonLijst() {
    let lijst = document.getElementById("lijst");
    lijst.innerHTML = "";

    patiënten.forEach(p => {
        lijst.innerHTML += `
            <div class="patient">
                <b>${p.naam}</b> (${p.id})<br>
                Reden: ${p.reden}<br>
                Rapport: ${p.rapport}
            </div>
        `;
    });
}

function volgende() {
    if (patiënten.length > 0) {
        let huidige = patiënten.shift();
        alert(huidige.naam + " is nu aan de beurt!");
        toonLijst();
    }
}

function zoekPatient() {
    let zoekTerm = document.getElementById("zoek").value.toLowerCase();
    let gevonden = patiënten.filter(p =>
        p.naam.toLowerCase().includes(zoekTerm) ||
        p.id.toLowerCase().includes(zoekTerm)
    );

    let lijst = document.getElementById("lijst");
    lijst.innerHTML = "";

    gevonden.forEach(p => {
        lijst.innerHTML += `
            <div class="patient">
                <b>${p.naam}</b> (${p.id})<br>
                Reden: ${p.reden}<br>
                Rapport: ${p.rapport}
            </div>
        `;
    });
}
</script>

</body>
</html>
