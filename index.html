<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Zorg Systeem</title>
<style>
/* 🌙 Algemene styling */
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #0B0F2A;
    color: #FFF;
}
h1, h2, h3 { color: #0AF; }
button {
    background-color: #0AF;
    border: none;
    color: #fff;
    padding: 10px 20px;
    margin: 5px 0;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.2s;
}
button:hover { background-color: #08C; }
input, select { padding: 8px; margin: 5px 0; border-radius: 4px; border: none; }
input[type=text] { width: 100%; }

/* 🟦 Layout */
.container { display: flex; height: 100vh; }
.menu {
    width: 220px;
    background-color: #0C134F;
    padding: 20px;
    box-sizing: border-box;
}
.menu button { width: 100%; display: block; margin-bottom: 10px; }

.main {
    flex-grow: 1;
    padding: 30px;
    overflow-y: auto;
}

/* 🩺 Patiënt cards */
.patient-card {
    background-color: #141B50;
    padding: 15px;
    margin: 10px 0;
    border-radius: 8px;
}

/* 🎯 Info balk */
.info-bar {
    background-color: #0A1230;
    padding: 10px;
    margin-bottom: 20px;
    border-radius: 6px;
}

/* 🔒 Verborgen content */
.hidden { display: none; }

/* 🔎 Zoekbalk */
.search-bar { display: flex; gap: 10px; margin-bottom: 15px; }
</style>
</head>
<body>

<div class="container">

    <!-- 🔹 Menu -->
    <div class="menu">
        <h2>Zorg Systeem</h2>
        <button onclick="showPage('oproep')">Oproepsysteem</button>
        <button onclick="showPage('database')">Patiënten Database</button>
    </div>

    <!-- 🔹 Main Content -->
    <div class="main">
        
        <!-- Login voor token -->
        <div id="login">
            <h2>Inloggen met Token</h2>
            <input type="text" id="tokenInput" placeholder="Voer token in (bijv. ZZ3194)">
            <button onclick="checkToken()">Inloggen</button>
            <p id="loginMsg"></p>
        </div>

        <!-- Oproepsysteem -->
        <div id="oproep" class="hidden">
            <h2>Oproepsysteem</h2>
            <div class="info-bar" id="infoOproep">Gemiddelde wachttijd: 0 min | Aantal patiënten: 0</div>

            <h3>Nieuwe patiënt registreren</h3>
            <input type="text" id="naam" placeholder="Naam">
            <input type="text" id="id" placeholder="ID">
            <select id="geslacht">
                <option>Man</option>
                <option>Vrouw</option>
            </select>
            <input type="text" id="reden" placeholder="Reden afspraak">
            <select id="rapport">
                <option>Ja</option>
                <option>Nee</option>
            </select>
            <button onclick="voegToe()">Toevoegen</button>

            <hr>

            <h3>Wachtrij</h3>
            <button onclick="volgende()">Volgende patiënt</button>
            <div id="wachtrijLijst"></div>
        </div>

        <!-- Patiënten Database -->
        <div id="database" class="hidden">
            <h2>Patiënten Database</h2>
            <div class="search-bar">
                <input type="text" id="zoek" placeholder="Zoek op naam of ID">
                <button onclick="zoekPatient()">Zoek</button>
            </div>
            <div id="databaseLijst"></div>
        </div>

    </div>
</div>

<script>
// 🔒 Login
let correctToken = "ZZ3194";
let loggedIn = false;

function checkToken() {
    let t = document.getElementById("tokenInput").value.trim();
    if(t === correctToken) {
        loggedIn = true;
        document.getElementById("login").classList.add("hidden");
        showPage('oproep');
    } else {
        document.getElementById("loginMsg").innerText = "Token ongeldig!";
    }
}

// 📋 Patiëntenlijst
let patiënten = [];

// 🔹 Toevoegen
function voegToe() {
    if(!loggedIn) { alert("Geen toegang!"); return; }
    let p = {
        naam: document.getElementById("naam").value,
        id: document.getElementById("id").value,
        geslacht: document.getElementById("geslacht").value,
        reden: document.getElementById("reden").value,
        rapport: document.getElementById("rapport").value
    };
    patiënten.push(p);
    toonWachtrij();
    updateInfo();
    clearForm();
}

function clearForm() {
    document.getElementById("naam").value = "";
    document.getElementById("id").value = "";
    document.getElementById("reden").value = "";
}

// 🔹 Wachtrij tonen
function toonWachtrij() {
    let div = document.getElementById("wachtrijLijst");
    div.innerHTML = "";
    patiënten.forEach(p => {
        div.innerHTML += `
            <div class="patient-card">
                <b>${p.naam}</b> (${p.id})<br>
                Reden: ${p.reden} | Rapport: ${p.rapport}
            </div>
        `;
    });
}

// 🔹 Volgende patiënt
function volgende() {
    if(!loggedIn) { alert("Geen toegang!"); return; }
    if(patiënten.length === 0) { alert("Geen patiënten!"); return; }
    let huidige = patiënten.shift();
    alert(`${huidige.naam} is nu aan de beurt!`);
    toonWachtrij();
    updateInfo();
}

// 🔹 Gemiddelde wachttijd
function updateInfo() {
    let info = document.getElementById("infoOproep");
    let avgTime = patiënten.length * 5; // stel gemiddeld 5 min per patient
    info.innerText = `Gemiddelde wachttijd: ${avgTime} min | Aantal patiënten: ${patiënten.length}`;
}

// 🔹 Database zoeken
function zoekPatient() {
    if(!loggedIn) { alert("Geen toegang!"); return; }
    let term = document.getElementById("zoek").value.toLowerCase();
    let resultaten = patiënten.filter(p => 
        p.naam.toLowerCase().includes(term) || p.id.toLowerCase().includes(term)
    );
    let div = document.getElementById("databaseLijst");
    div.innerHTML = "";
    resultaten.forEach(p => {
        div.innerHTML += `
            <div class="patient-card">
                <b>${p.naam}</b> (${p.id})<br>
                Reden: ${p.reden} | Rapport: ${p.rapport} | Geslacht: ${p.geslacht}
            </div>
        `;
    });
}

// 🔹 Pagina wisselen
function showPage(page) {
    if(!loggedIn && page === 'database') { 
        alert("Geen toegang!"); 
        return; 
    }
    document.getElementById("oproep").classList.add("hidden");
    document.getElementById("database").classList.add("hidden");
    document.getElementById(page).classList.remove("hidden");
}
</script>
</body>
</html>
