<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ziekenhuis Systeem</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#eaf3fb;
}

.menu{
    width:250px;
    height:100vh;
    background:#0a3d62;
    color:white;
    position:fixed;
    padding:20px;
}

.menu h2{
    text-align:center;
}

.menu button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#1e90ff;
    border:none;
    color:white;
    font-weight:bold;
    cursor:pointer;
    border-radius:6px;
}

.menu button:hover{
    background:#4da6ff;
}

.content{
    margin-left:270px;
    padding:30px;
}

.card{
    background:white;
    padding:20px;
    margin:10px 0;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.bigstat{
    font-size:32px;
    font-weight:bold;
}

.room{
    display:inline-block;
    padding:10px 20px;
    margin:5px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.available{
    background:#b8f5b8;
}

.occupied{
    background:#ffb3b3;
}

input, select{
    padding:8px;
    margin:5px;
    border-radius:5px;
    border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="menu">
<h2>Ziekenhuis</h2>
<button onclick="showPage('database')">Patiënten Database</button>
<button onclick="showPage('oproep')">Oproepsysteem</button>
<button onclick="showPage('apotheek')">Apotheek</button>
<button onclick="showPage('kamers')">Kamerbeheer</button>
</div>

<div class="content">

<!-- DATABASE -->
<div id="database" style="display:none">
<h2>Patiënten Database</h2>

<div class="card">
<h3>Nieuwe patiënt registreren</h3>
<input id="naam" placeholder="Naam">
<input id="id" placeholder="ID">
<select id="status">
<option>In wachtkamer</option>
<option>Bezig</option>
<option>Afgehandeld</option>
</select>
<button onclick="registreer()">Registreren</button>
</div>

<div class="card">
<h3>Zoeken</h3>
<input id="zoek" placeholder="Zoek op naam of ID">
<button onclick="zoekPatient()">Zoek</button>
</div>

<div class="card">
<h3>Alle patiënten</h3>
<div id="patientLijst"></div>
</div>
</div>

<!-- OPROEPSYSTEEM -->
<div id="oproep" style="display:none">
<h2>Oproepsysteem</h2>

<div class="card bigstat">
Wachtenden: <span id="aantal">0</span>
</div>

<div class="card bigstat">
Laatst opgeroepen: <span id="laatste">-</span>
</div>

<div class="card bigstat">
Gemiddelde wachttijd: <span id="wachttijd">0</span> sec
</div>

<button onclick="volgende()" style="padding:20px;font-size:18px;">Volgende patiënt</button>
</div>

<!-- APOTHEEK -->
<div id="apotheek" style="display:none">
<h2>Apotheek</h2>

<div class="card">
<h3>Recept toevoegen</h3>
<input id="apNaam" placeholder="Naam">
<input id="apId" placeholder="ID">
<input id="medicijn" placeholder="Medicijn">
<button onclick="voegReceptToe()">Opslaan</button>
</div>

<div class="card">
<h3>Zoeken recept</h3>
<input id="zoekRecept">
<button onclick="zoekRecept()">Zoek</button>
</div>

<div id="receptLijst"></div>
</div>

<!-- KAMERS -->
<div id="kamers" style="display:none">
<h2>Kamerbeheer</h2>

<div class="card">
<h3>1e Verdieping</h3>
<div id="rooms1"></div>
</div>

<div class="card">
<h3>2e Verdieping</h3>
<div id="rooms2"></div>
</div>
</div>

</div>

<script>
let toegang = false;
let geheimeCode = "ZZ3194";

let patiënten = [];
let recepten = [];
let wachttijden = [];
let laatsteKlik = null;

function checkToegang(){
    if(!toegang){
        let invoer = prompt("Voer toegangscode in:");
        if(invoer === geheimeCode){
            toegang = true;
        }else{
            alert("Geen toegang");
            return false;
        }
    }
    return true;
}

function showPage(p){
    if(!checkToegang()) return;

    document.getElementById("database").style.display="none";
    document.getElementById("oproep").style.display="none";
    document.getElementById("apotheek").style.display="none";
    document.getElementById("kamers").style.display="none";

    document.getElementById(p).style.display="block";
}

function registreer(){
    let naam=document.getElementById("naam").value;
    let id=document.getElementById("id").value;
    let status=document.getElementById("status").value;

    patiënten.push({naam,id,status});
    updateLijst();
}

function updateLijst(){
    let lijst=document.getElementById("patientLijst");
    lijst.innerHTML="";
    patiënten.forEach(p=>{
        lijst.innerHTML+=`<div class="card">
        ${p.naam} (${p.id}) - Status: ${p.status}
        </div>`;
    });
    updateStats();
}

function zoekPatient(){
    let zoek=document.getElementById("zoek").value.toLowerCase();
    let lijst=document.getElementById("patientLijst");
    lijst.innerHTML="";
    patiënten.filter(p=>p.naam.toLowerCase().includes(zoek) || p.id.includes(zoek))
    .forEach(p=>{
        lijst.innerHTML+=`<div class="card">
        ${p.naam} (${p.id}) - Status: ${p.status}
        </div>`;
    });
}

function volgende(){
    let wachtenden=patiënten.filter(p=>p.status==="In wachtkamer");
    if(wachtenden.length===0){
        alert("Geen wachtenden");
        return;
    }

    let p=wachtenden[0];
    p.status="Bezig";
    document.getElementById("laatste").innerText=p.naam;

    let nu=Date.now();
    if(laatsteKlik){
        let verschil=(nu-laatsteKlik)/1000;
        wachttijden.push(verschil);
        let gem=wachttijden.reduce((a,b)=>a+b)/wachttijden.length;
        document.getElementById("wachttijd").innerText=Math.round(gem);
    }
    laatsteKlik=nu;

    updateLijst();
}

function updateStats(){
    let aantal=patiënten.filter(p=>p.status==="In wachtkamer").length;
    document.getElementById("aantal").innerText=aantal;
}

function voegReceptToe(){
    let naam=document.getElementById("apNaam").value;
    let id=document.getElementById("apId").value;
    let medicijn=document.getElementById("medicijn").value;

    recepten.push({naam,id,medicijn,status:"Klaar"});
    toonRecepten();
}

function toonRecepten(){
    let div=document.getElementById("receptLijst");
    div.innerHTML="";
    recepten.forEach(r=>{
        div.innerHTML+=`<div class="card">
        ${r.naam} (${r.id}) - ${r.medicijn} - ${r.status}
        </div>`;
    });
}

function zoekRecept(){
    let zoek=document.getElementById("zoekRecept").value.toLowerCase();
    let div=document.getElementById("receptLijst");
    div.innerHTML="";
    recepten.filter(r=>r.naam.toLowerCase().includes(zoek) || r.id.includes(zoek))
    .forEach(r=>{
        div.innerHTML+=`<div class="card">
        ${r.naam} (${r.id}) - ${r.medicijn} - ${r.status}
        </div>`;
    });
}

let rooms1=["SEH 101","SEH 102","SEH 103","SEH 104"];
let rooms2=["Huisartsenpost 204","Uitslaap 201","Uitslaap 202","Uitslaap 203","OK1","OK2","Kantoor 205","Kantoor 206"];

function maakKamers(){
    let r1=document.getElementById("rooms1");
    let r2=document.getElementById("rooms2");

    rooms1.forEach(r=>{
        let div=document.createElement("div");
        div.className="room available";
        div.innerText=r;
        div.onclick=()=>toggleRoom(div);
        r1.appendChild(div);
    });

    rooms2.forEach(r=>{
        let div=document.createElement("div");
        div.className="room available";
        div.innerText=r;
        div.onclick=()=>toggleRoom(div);
        r2.appendChild(div);
    });
}

function toggleRoom(el){
    if(el.classList.contains("available")){
        el.classList.remove("available");
        el.classList.add("occupied");
    }else{
        el.classList.remove("occupied");
        el.classList.add("available");
    }
}

maakKamers();
</script>

</body>
</html>
